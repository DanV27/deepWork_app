<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Deep Work Journal{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="brand-title">Deep Work Journal</div>
          <div class="brand-subtitle">Log sessions. Learn patterns. Build momentum.</div>
        </div>

        <nav class="nav">
          <a class="nav-link" href="{{ url_for('log') }}">Log</a>
          <a class="nav-link" href="{{ url_for('sessions') }}">Sessions</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container">
        <small>V3 • Flask + JSON • Built by Daniel</small>
      </div>
    </footer>
  </body>
</html>
