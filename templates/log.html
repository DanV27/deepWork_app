<!doctype html>
<html>
  <head>
    <title>Deep Work Log</title>
  </head>
  <body>
    <h1>Log a Deep Work Session</h1>
    <hr>

    <h2>Session Stats</h2>

    <p>Total sessions: {{ total_sessions }}</p>
    <p>Total focus time: {{ total_minutes }} minutes</p>
    <p>Average focus: {{ avg_focus }}</p>
    <p>Longest session: {{ longest_session }} minutes</p>

    <hr>


    
    <form action="/log" method="post">
      <label for="task">Task Description:</label>
      <input type="text" id="task" name="task" required>
      <br><br>
      <label for="duration">Duration (minutes):</label>
      <input type="number" id="duration" name="duration" required>
      
      <br><br>
      <label for="focus">Focus Level (1-10):</label>
      <input type="number" id="focus" name="focus" min="1" max="10" required>
      <br><br>
      <button type="submit">Log Session</button>

      
    </form>
    <br>
    <a href="/sessions">View Sessions</a>
  </body>
</html>
